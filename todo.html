<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todoリスト</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: flex-start;
    min-height: 100vh; background: #1a1a2e; font-family: 'Segoe UI', sans-serif;
    padding: 40px 16px;
  }
  .container {
    background: #16213e; border-radius: 16px; padding: 28px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4); width: 100%; max-width: 480px;
  }
  h1 { color: #e6e6e6; font-size: 24px; margin-bottom: 20px; text-align: center; }
  .input-row {
    display: flex; gap: 10px; margin-bottom: 24px;
  }
  .input-row input {
    flex: 1; padding: 12px 16px; border: none; border-radius: 10px;
    background: #0f3460; color: #e6e6e6; font-size: 16px; outline: none;
  }
  .input-row input::placeholder { color: #7f8c9b; }
  .input-row button {
    padding: 12px 20px; border: none; border-radius: 10px;
    background: #e94560; color: #fff; font-size: 16px; font-weight: 600;
    cursor: pointer; transition: background 0.15s; white-space: nowrap;
  }
  .input-row button:hover { background: #ff6b81; }
  .filters {
    display: flex; gap: 8px; margin-bottom: 16px; justify-content: center;
  }
  .filters button {
    padding: 6px 14px; border: none; border-radius: 8px;
    background: #1a1a40; color: #7f8c9b; font-size: 13px; cursor: pointer;
    transition: background 0.15s, color 0.15s;
  }
  .filters button.active { background: #533483; color: #e6e6e6; }
  .filters button:hover { color: #e6e6e6; }
  .todo-list { list-style: none; }
  .todo-item {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-radius: 10px; margin-bottom: 8px;
    background: #0f3460; transition: opacity 0.3s, transform 0.3s;
  }
  .todo-item.removing { opacity: 0; transform: translateX(40px); }
  .todo-item input[type="checkbox"] {
    width: 20px; height: 20px; accent-color: #e94560; cursor: pointer; flex-shrink: 0;
  }
  .todo-item .text {
    flex: 1; color: #e6e6e6; font-size: 15px; word-break: break-word;
    transition: color 0.2s, text-decoration 0.2s;
  }
  .todo-item.done .text { color: #7f8c9b; text-decoration: line-through; }
  .todo-item .delete {
    background: none; border: none; color: #7f8c9b; font-size: 18px;
    cursor: pointer; padding: 4px 8px; border-radius: 6px; transition: color 0.15s, background 0.15s;
  }
  .todo-item .delete:hover { color: #e94560; background: rgba(233,69,96,0.15); }
  .status {
    text-align: center; color: #7f8c9b; font-size: 13px; margin-top: 16px;
  }
  .empty {
    text-align: center; color: #7f8c9b; padding: 32px 0; font-size: 15px;
  }
  .sync-row {
    display: flex; gap: 8px; margin-top: 16px; justify-content: center;
  }
  .sync-row button {
    padding: 8px 16px; border: none; border-radius: 8px;
    font-size: 13px; font-weight: 500; cursor: pointer; transition: background 0.15s, transform 0.1s;
  }
  .sync-row button:active { transform: scale(0.95); }
  .btn-upload { background: #0f9b58; color: #fff; }
  .btn-upload:hover { background: #12b566; }
  .btn-download { background: #4285f4; color: #fff; }
  .btn-download:hover { background: #5a9bf4; }
  .sync-msg {
    text-align: center; font-size: 12px; margin-top: 8px; min-height: 18px;
    transition: opacity 0.3s;
  }
  .sync-msg.success { color: #0f9b58; }
  .sync-msg.error { color: #e94560; }
  .sync-msg.loading { color: #7f8c9b; }
</style>
</head>
<body>

<div class="container">
  <h1>Todo リスト</h1>
  <div class="input-row">
    <input type="text" id="input" placeholder="新しいタスクを入力..." autofocus>
    <button onclick="addTodo()">追加</button>
  </div>
  <div class="filters">
    <button class="active" data-filter="all" onclick="setFilter('all', this)">すべて</button>
    <button data-filter="active" onclick="setFilter('active', this)">未完了</button>
    <button data-filter="done" onclick="setFilter('done', this)">完了</button>
  </div>
  <ul class="todo-list" id="list"></ul>
  <div class="status" id="status"></div>

  <div class="sync-row">
    <button class="btn-upload" onclick="syncToSheet()">📤 スプシに送信</button>
    <button class="btn-download" onclick="syncFromSheet()">📥 スプシから取得</button>
  </div>
  <div class="sync-msg" id="syncMsg"></div>
</div>

<script>
  const GAS_URL = 'https://script.google.com/macros/s/AKfycby6aimZPEBu2c7trVh9iO_AcEHgTofitzNCvcHx6gRDmEi2L1trIy2KZUkqV9GSvDCe/exec';

  let todos = JSON.parse(localStorage.getItem('todos') || '[]');
  let filter = 'all';
  const $input = document.getElementById('input');
  const $list = document.getElementById('list');
  const $status = document.getElementById('status');
  const $syncMsg = document.getElementById('syncMsg');

  $input.addEventListener('keydown', (e) => { if (e.key === 'Enter') addTodo(); });

  function save() { localStorage.setItem('todos', JSON.stringify(todos)); }

  function addTodo() {
    const text = $input.value.trim();
    if (!text) return;
    todos.push({ id: Date.now(), text, done: false });
    $input.value = '';
    save(); render();
  }

  function toggle(id) {
    const t = todos.find(t => t.id === id);
    if (t) t.done = !t.done;
    save(); render();
  }

  function remove(id) {
    const el = document.querySelector(`[data-id="${id}"]`);
    if (el) {
      el.classList.add('removing');
      setTimeout(() => { todos = todos.filter(t => t.id !== id); save(); render(); }, 300);
    }
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filters button').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const filtered = todos.filter(t =>
      filter === 'all' ? true : filter === 'active' ? !t.done : t.done
    );
    if (filtered.length === 0) {
      const msg = todos.length === 0 ? 'タスクがありません' :
        filter === 'active' ? '未完了のタスクはありません' : '完了したタスクはありません';
      $list.innerHTML = `<div class="empty">${msg}</div>`;
    } else {
      $list.innerHTML = filtered.map(t => `
        <li class="todo-item ${t.done ? 'done' : ''}" data-id="${t.id}">
          <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${t.id})">
          <span class="text">${escapeHtml(t.text)}</span>
          <button class="delete" onclick="remove(${t.id})">&#x2715;</button>
        </li>
      `).join('');
    }
    const active = todos.filter(t => !t.done).length;
    const done = todos.filter(t => t.done).length;
    $status.textContent = todos.length ? `${active} 件の未完了 / ${done} 件の完了` : '';
  }

  function escapeHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // --- スプレッドシート連携 ---

  function showSyncMsg(text, type) {
    $syncMsg.textContent = text;
    $syncMsg.className = 'sync-msg ' + type;
    if (type !== 'loading') {
      setTimeout(() => { $syncMsg.textContent = ''; $syncMsg.className = 'sync-msg'; }, 3000);
    }
  }

  async function syncToSheet() {
    showSyncMsg('スプレッドシートに送信中...', 'loading');
    try {
      const res = await fetch(GAS_URL, {
        method: 'POST',
        body: JSON.stringify({ todos }),
      });
      const data = await res.json();
      if (data.status === 'ok') {
        showSyncMsg(`✅ ${data.count} 件をスプシに送信しました`, 'success');
      } else {
        showSyncMsg('❌ 送信エラー: ' + (data.message || '不明'), 'error');
      }
    } catch (err) {
      showSyncMsg('❌ 通信エラー: ' + err.message, 'error');
    }
  }

  async function syncFromSheet() {
    showSyncMsg('スプレッドシートから取得中...', 'loading');
    try {
      const res = await fetch(GAS_URL);
      const data = await res.json();
      if (data.status === 'ok') {
        todos = data.todos.map(t => ({
          id: t.id || Date.now() + Math.random(),
          text: t.text,
          done: !!t.done
        }));
        save(); render();
        showSyncMsg(`✅ ${todos.length} 件をスプシから取得しました`, 'success');
      } else {
        showSyncMsg('❌ 取得エラー', 'error');
      }
    } catch (err) {
      showSyncMsg('❌ 通信エラー: ' + err.message, 'error');
    }
  }

  render();
</script>
</body>
</html>
